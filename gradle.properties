# 1. Reducimos el tope de RAM de Gradle a 1.5 GB y optimizamos codificación
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# 2. Mantenemos el Configuration Cache activo (¡esto es muy bueno para la velocidad!)
org.gradle.configuration-cache=true

# 3. Forzamos a Gradle a usar máximo 2 hilos/procesos en paralelo (evita picos de RAM)
org.gradle.workers.max=2

# 4. Activamos paralelismo inteligente y configuración bajo demanda
org.gradle.parallel=true
org.gradle.configureondemand=true

# 5. Estilo de código predeterminado
kotlin.code.style=official